name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # v2 temporarily disabled - building v1 only for Kylin/UOS compatibility
          # - version: v2
          #   tauri_dir: client-tauri2
          #   webkit_dev: libwebkit2gtk-4.1-dev
          #   platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   arch: x86_64
          # - version: v2
          #   tauri_dir: client-tauri2
          #   webkit_dev: libwebkit2gtk-4.1-dev
          #   platform: ubuntu-22.04-arm
          #   target: aarch64-unknown-linux-gnu
          #   arch: arm64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64

    runs-on: ${{ matrix.platform }}
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
      OPENSSL_DIR: /opt/openssl-1.0.2
      OPENSSL_INCLUDE_DIR: /opt/openssl-1.0.2/include
      OPENSSL_LIB_DIR: /opt/openssl-1.0.2/lib
      OPENSSL_NO_VENDOR: "1"
      OPENSSL_STATIC: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.webkit_dev }} libgtk-3-dev libappindicator3-dev librsvg2-dev binutils dpkg-dev patchelf libfuse2 xdg-utils zstd pkg-config build-essential perl curl ca-certificates

      # Static OpenSSL 1.0.2: embedded into the binary so the deb works on both
      # Kylin (system openssl 1.0.2g) and UOS (no openssl 1.0.x at all) without
      # touching target system dependencies. Legacy ciphers stay available.
      - name: Build OpenSSL 1.0.2 static libraries
        run: |
          set -euo pipefail
          openssl_version="1.0.2u"
          openssl_sha256="ecd0c6ffb493dd06707d38b14bb4d8c2288bb7033735606569d8f90f89669d16"
          workdir="$(mktemp -d)"
          # openssl.org removed old-release tarballs (404); use the official GitHub release asset
          curl -fsSL --retry 5 --retry-delay 5 \
            "https://github.com/openssl/openssl/releases/download/OpenSSL_1_0_2u/openssl-${openssl_version}.tar.gz" \
            -o "$workdir/openssl-${openssl_version}.tar.gz"
          echo "$openssl_sha256  $workdir/openssl-${openssl_version}.tar.gz" | sha256sum -c -
          tar -xzf "$workdir/openssl-${openssl_version}.tar.gz" -C "$workdir"
          cd "$workdir/openssl-${openssl_version}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            openssl_target="linux-aarch64"
          else
            openssl_target="linux-x86_64"
          fi
          ./Configure "$openssl_target" no-shared no-dso -fPIC \
            --prefix="$OPENSSL_DIR" \
            --openssldir="$OPENSSL_DIR/ssl"
          make -j"$(nproc)"
          sudo make install_sw
          ls -l "$OPENSSL_LIB_DIR"/libssl.a "$OPENSSL_LIB_DIR"/libcrypto.a
          rm -rf "$workdir"

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend assets
        run: pnpm --dir ${{ matrix.tauri_dir }} build:ui

      - name: Check Rust TLS dependency tree
        run: |
          set -euo pipefail
          cd "${{ matrix.tauri_dir }}/src-tauri"
          python3 - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("tauri.conf.json").read_text())
          allowlist = config.get("tauri", {}).get("allowlist", {})
          http = allowlist.get("http", {})

          if allowlist.get("all") is True:
              raise SystemExit("ERROR: tauri.allowlist.all enables api-all, which pulls native OpenSSL")

          if http.get("all") is True or http.get("request") is True:
              raise SystemExit("ERROR: Tauri built-in HTTP API may pull an uncontrolled OpenSSL version; use the app's native TLS path instead")
          PY
          for attempt in 1 2 3 4 5; do
            if cargo tree --target ${{ matrix.target }} --features custom-protocol --prefix depth > /tmp/cargo-tree.txt; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "ERROR: cargo tree failed after $attempt attempts"
              exit 1
            fi
            echo "cargo tree failed, retrying in $((attempt * 5)) seconds..."
            sleep $((attempt * 5))
          done
          if ! grep -E '(openssl|native-tls|tokio-native-tls) v[0-9]' /tmp/cargo-tree.txt; then
            echo "ERROR: Linux package is expected to use OpenSSL/native-tls"
            exit 1
          fi
          grep -E '(openssl|openssl-sys|native-tls|tokio-native-tls|hyper-tls) v[0-9]' /tmp/cargo-tree.txt || true

      - name: Build Linux packages with glibc 2.23 linker
        env:
          TAURI_TRAY: libappindicator3
        run: |
          set -euo pipefail
          linker="/tmp/zig-cc-glibc-2.23"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig_target="aarch64-linux-gnu.2.23"
            lib_dir="/usr/lib/aarch64-linux-gnu"
            base_lib_dir="/lib/aarch64-linux-gnu"
            rust_linker_env="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER"
          else
            zig_target="x86_64-linux-gnu.2.23"
            lib_dir="/usr/lib/x86_64-linux-gnu"
            base_lib_dir="/lib/x86_64-linux-gnu"
            rust_linker_env="CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER"
          fi
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            "exec zig cc -target $zig_target -L$OPENSSL_LIB_DIR -L$lib_dir -L$base_lib_dir \"\$@\"" \
            > "$linker"
          chmod +x "$linker"
          export "$rust_linker_env=$linker"
          export PKG_CONFIG_ALLOW_CROSS=1
          export LIBRARY_PATH="$OPENSSL_LIB_DIR:$lib_dir:$base_lib_dir${LIBRARY_PATH:+:$LIBRARY_PATH}"
          export PKG_CONFIG_PATH="$OPENSSL_LIB_DIR/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          export CI=true
          echo "Using Zig target: $zig_target"
          echo "Using library directory: $lib_dir"
          echo "Using OpenSSL directory: $OPENSSL_DIR"
          pkg-config --modversion openssl
          pkg-config --libs openssl
          pkg-config --libs webkit2gtk-4.0 gtk+-3.0
          ls -l "$lib_dir/libwebkit2gtk-4.0.so" "$lib_dir/libgtk-3.so"
          pnpm --dir ${{ matrix.tauri_dir }} tauri build --config src-tauri/tauri.linux.legacy.conf.json --target ${{ matrix.target }} --bundles deb

      - name: Fix deb desktop entries
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          for deb in "$bundle_root"/deb/*.deb; do
            [ -e "$deb" ] || continue
            deb=$(realpath "$deb")
            tempdir=$(mktemp -d)
            dpkg-deb -x "$deb" "$tempdir"
            mkdir -p "$tempdir/DEBIAN"
            dpkg-deb -e "$deb" "$tempdir/DEBIAN"

            desktop_file=$(find "$tempdir/usr/share/applications" -name "*.desktop" | head -n1)
            if [ -f "$desktop_file" ]; then
              echo "Patching $desktop_file"

              # Ensure Type=Application (required by freedesktop spec)
              grep -q "^Type=" "$desktop_file" || echo "Type=Application" >> "$desktop_file"

              # Ensure Categories has a valid main category (Business alone is not a main category)
              if grep -q "^Categories=" "$desktop_file"; then
                current_cat=$(grep "^Categories=" "$desktop_file" | sed 's/Categories=//')
                # If Categories only contains Business (no main category), prepend Office
                if echo "$current_cat" | grep -qE '^Business;?$'; then
                  sed -i 's/^Categories=.*/Categories=Office;Business;/' "$desktop_file"
                fi
              else
                echo "Categories=Office;Business;" >> "$desktop_file"
              fi

              grep -q "^StartupNotify=" "$desktop_file" && \
                sed -i 's/^StartupNotify=.*/StartupNotify=true/' "$desktop_file" || \
                echo "StartupNotify=true" >> "$desktop_file"

              grep -q "^Terminal=" "$desktop_file" && \
                sed -i 's/^Terminal=.*/Terminal=false/' "$desktop_file" || \
                echo "Terminal=false" >> "$desktop_file"

              wmclass="cpmsClient"
              if [ "${{ matrix.version }}" = "v1" ]; then
                wmclass="cpmsClient-v1"
              else
                wmclass="cpmsClient-v2"
              fi
              grep -q "^StartupWMClass=" "$desktop_file" && \
                sed -i "s/^StartupWMClass=.*/StartupWMClass=$wmclass/" "$desktop_file" || \
                echo "StartupWMClass=$wmclass" >> "$desktop_file"

              echo "--- Final .desktop content ---"
              cat "$desktop_file"
            else
              echo "WARNING: No .desktop file found in extracted deb!"
            fi

            # Inject postinst to refresh icon cache
            postinst="$tempdir/DEBIAN/postinst"
            if [ -f "$postinst" ]; then
              echo "" >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
            else
              echo '#!/bin/sh' > "$postinst"
              echo 'set -e' >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              chmod 755 "$postinst"
            fi

            dpkg-deb -b "$tempdir" "$deb"
            rm -rf "$tempdir"

            # Convert zstd/xz compression back to gzip for compatibility with older dpkg
            ar_tmp=$(mktemp -d)
            pushd "$ar_tmp" >/dev/null
            ar x "$deb"
            for f in control.tar.* data.tar.*; do
              case "$f" in
                *.zst)
                  zstd -d "$f" -o "${f%.zst}"
                  gzip -n "${f%.zst}"
                  rm -f "$f"
                  ;;
                *.xz)
                  xz -d "$f"
                  gzip -n "${f%.xz}"
                  rm -f "$f"
                  ;;
              esac
            done
            rm -f "$deb"
            ar rcs "$deb" debian-binary control.tar.gz data.tar.gz
            popd >/dev/null
            rm -rf "$ar_tmp"
          done

      - name: Verify generated Linux bundles
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$bundle_root" -maxdepth 3 -type f -print
          for dir in deb; do
            if ! find "$bundle_root/$dir" -maxdepth 1 -type f | grep -q .; then
              echo "Missing Linux ${{ matrix.version }} bundle output: $dir"
              exit 1
            fi
          done
          du -h "$bundle_root"/deb/*

      - name: Debug deb package contents
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          for deb in "$bundle_root"/deb/*.deb; do
            [ -e "$deb" ] || continue
            echo "========== Package: $deb =========="
            echo "--- Control info ---"
            dpkg-deb -I "$deb"
            echo ""
            echo "--- File list ---"
            dpkg-deb -c "$deb"
            echo ""
            echo "--- .desktop file ---"
            tempdir=$(mktemp -d)
            dpkg-deb -x "$deb" "$tempdir"
            desktop_file=$(find "$tempdir/usr/share/applications" -name "*.desktop" 2>/dev/null | head -n1)
            if [ -f "$desktop_file" ]; then
              cat "$desktop_file"
            else
              echo "ERROR: No .desktop file found in package!"
            fi
            echo ""
            echo "--- Binary check ---"
            find "$tempdir/usr/bin" -type f 2>/dev/null | head -5
            bin_file=$(find "$tempdir/usr/bin" -maxdepth 1 -type f 2>/dev/null | head -n1)
            if [ -n "$bin_file" ]; then
              echo ""
              echo "--- Dynamic dependencies ---"
              readelf -d "$bin_file" | grep NEEDED || true
              if readelf -d "$bin_file" | grep NEEDED | grep -qE 'lib(ssl|crypto)\.so'; then
                echo "ERROR: OpenSSL must be statically linked; binary must not load any system libssl/libcrypto"
                exit 1
              fi
              echo ""
              echo "--- GTK legacy symbol check ---"
              if readelf -Ws "$bin_file" | grep -qE 'gdk_(display_get_n_monitors|monitor_)'; then
                readelf -Ws "$bin_file" | grep -E 'gdk_(display_get_n_monitors|monitor_)' || true
                echo "ERROR: binary uses GDK monitor APIs introduced after GTK 3.18"
                exit 1
              fi
              echo ""
              echo "--- GLIBC symbol versions ---"
              readelf -V "$bin_file" | grep -o 'GLIBC_[0-9.]*' | sort -Vu || true
              if readelf -V "$bin_file" | grep -qE 'GLIBC_2\.(2[4-9]|[3-9][0-9])'; then
                echo "ERROR: binary requires GLIBC newer than 2.23"
                exit 1
              fi
            fi
            echo ""
            echo "--- Icon check ---"
            find "$tempdir/usr/share/icons" -type f 2>/dev/null | head -10
            rm -rf "$tempdir"
          done

      - name: Prepare Linux artifacts
        run: |
          mkdir -p upload
          cp ${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb upload/
          ls -la upload/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-${{ matrix.version }}-linux-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" release/
          done
          echo "========== Release files =========="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
