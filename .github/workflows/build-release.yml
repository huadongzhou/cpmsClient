# ==========================================================================
# 构建任务配置总览（按目标环境划分）
#
# | 任务                  | 目标环境               | 壳     | 产物        | 架构            | 状态 |
# | build-windows         | Windows 10/11          | Tauri2 | msi + nsis  | x86_64 + arm64  | 跳过 |
# | build-macos           | macOS                  | Tauri2 | app + dmg   | x86_64 + arm64  | 跳过 |
# | build-linux-v2        | 通用新版 Linux (wk4.1) | Tauri2 | deb         | x86_64 + arm64  | 跳过 |
# | build-linux-domestic  | 麒麟旧 kylin-legacy    | Tauri1 | deb         | x86_64 + arm64  | 构建 |
# |                       | 统信旧 uos-legacy      | Tauri1 | deb         | x86_64 + arm64  | 构建 |
# |                       | 麒麟新 kylin-modern    | Tauri1 | deb         | x86_64 + arm64  | 占位 |
# |                       | 统信新 uos-modern      | Tauri? | deb         | x86_64 + arm64  | 占位 |
#
# 当前策略：只构建国产 deb（Linux 系列一律只出 deb，不出 rpm/appimage）。
# 跳过的任务保留完整配置（if: false），需要时改为 true 激活，激活后需自行
# 走一轮"推送-看日志-修复"验证（这些步骤未经实跑）。
#
# legacy 链路的坑、根因与修复全记录在 .github/CI-TROUBLESHOOTING.md，
# 改动 Zig 链接器 / 静态 OpenSSL / vendored tao+wry / 符号门禁前先读它。
# ==========================================================================
name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  # ========================================================================
  # Windows（Tauri 2 壳，msi + nsis）—— 暂跳过
  # ========================================================================
  build-windows:
    if: false # 当前只构建国产 deb
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install dependencies
        run: pnpm install
      - name: Build Windows packages
        run: pnpm --dir client-tauri2 tauri build --target ${{ matrix.target }} --bundles msi nsis
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-win-${{ matrix.arch }}
          path: |
            client-tauri2/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*
            client-tauri2/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*
          if-no-files-found: error

  # ========================================================================
  # macOS（Tauri 2 壳，app + dmg）—— 暂跳过
  # ========================================================================
  build-macos:
    if: false # 当前只构建国产 deb
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
          - arch: arm64
            target: aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install dependencies
        run: pnpm install
      - name: Build macOS packages
        run: pnpm --dir client-tauri2 tauri build --target ${{ matrix.target }} --bundles app dmg
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-mac-${{ matrix.arch }}
          path: |
            client-tauri2/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*
          if-no-files-found: error

  # ========================================================================
  # 通用新版 Linux（Tauri 2 壳，libwebkit2gtk-4.1 发行版，只出 deb）—— 暂跳过
  # ========================================================================
  build-linux-v2:
    if: false # 当前只构建国产 deb
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - name: Install dependencies
        run: pnpm install
      - name: Build Linux v2 packages
        run: pnpm --dir client-tauri2 tauri build --config src-tauri/tauri.linux.conf.json --target ${{ matrix.target }} --bundles deb
      - name: Upload Linux v2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-v2-linux-${{ matrix.arch }}
          path: client-tauri2/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: error

  # ========================================================================
  # 国产 Linux（Tauri 1 legacy 壳，只出 deb）—— 当前唯一激活的构建
  #
  # 链路：Zig 链接器锁 glibc 2.23 + 静态 OpenSSL 1.1.1w + vendored tao/wry
  #       补丁（GTK 3.18 / webkit 2.20 老 API）+ 前端 ES2015 + 符号硬门禁。
  # 同一条链产出的包向上兼容：库栈不老于 Ubuntu 16.04 的发行版都能跑。
  # kylin-legacy 与 uos-legacy 目前共用同一构建参数，分开出包便于按系统
  # 分发管理；如想节省 CI 时长可只保留 kylin-legacy（实机已验证统信可用）。
  # ========================================================================
  build-linux-domestic:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- 麒麟旧 kylin-legacy：Kylin V10 (juniper) 及更老 ----
          # 实机画像：glibc 2.23 / GTK 3.18.9 / webkit2gtk 2.20.5 / gdk-pixbuf 2.32
          # 门禁容器 ubuntu:16.04 与其完全同代（已验证 ldd -r 清单逐项吻合）
          - env_name: kylin-legacy
            tauri_dir: client-tauri1
            arch: x86_64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            gate_image: ubuntu:16.04
            gate_mirror: http://archive.ubuntu.com/ubuntu
          - env_name: kylin-legacy
            tauri_dir: client-tauri1
            arch: arm64
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            gate_image: arm64v8/ubuntu:16.04
            gate_mirror: http://ports.ubuntu.com/ubuntu-ports
          # ---- 统信旧 uos-legacy：UOS V20 ----
          # 实机已验证 16.04 底线的包可正常运行；库栈比麒麟旧新（glibc≈2.28、
          # GTK≥3.22、webkit≥2.22），暂与 kylin-legacy 共用构建参数和门禁
          - env_name: uos-legacy
            tauri_dir: client-tauri1
            arch: x86_64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            gate_image: ubuntu:16.04
            gate_mirror: http://archive.ubuntu.com/ubuntu
          - env_name: uos-legacy
            tauri_dir: client-tauri1
            arch: arm64
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            gate_image: arm64v8/ubuntu:16.04
            gate_mirror: http://ports.ubuntu.com/ubuntu-ports
          # ---- 麒麟新 kylin-modern：V10 SP1+ ----（占位，待真机库版本数据）
          # 拿到 dpkg -l / ldd --version 输出后再定：若 webkit 仍为 4.0 系，
          # 复制 kylin-legacy 条目并把 gate_image 换成对应年代的容器即可；
          # 在此之前 kylin-legacy 的包可直接在新麒麟上使用（向上兼容）。
          # - env_name: kylin-modern
          #   ...
          # ---- 统信新 uos-modern：V23/V25 ----（占位，待真机库版本数据）
          # 若新统信带 libwebkit2gtk-4.1，应改走 build-linux-v2 (Tauri 2) 链路。
          # - env_name: uos-modern
          #   ...

    runs-on: ${{ matrix.platform }}
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
      OPENSSL_DIR: /opt/openssl-1.1.1
      OPENSSL_INCLUDE_DIR: /opt/openssl-1.1.1/include
      OPENSSL_LIB_DIR: /opt/openssl-1.1.1/lib
      OPENSSL_NO_VENDOR: "1"
      OPENSSL_STATIC: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libappindicator3-dev librsvg2-dev binutils dpkg-dev patchelf libfuse2 xdg-utils zstd pkg-config build-essential perl curl ca-certificates

      # Static OpenSSL 1.1.1w: embedded into the binary so the deb works on both
      # Kylin (system openssl 1.0.2g) and UOS (no openssl 1.0.x at all) without
      # touching target system dependencies. 1.1.1 is the oldest line modern
      # openssl-sys accepts (1.0.2 is rejected) and still speaks TLS 1.0-1.3
      # with legacy ciphers for old intranet servers.
      - name: Build OpenSSL 1.1.1 static libraries
        run: |
          set -euo pipefail
          openssl_version="1.1.1w"
          openssl_sha256="cf3098950cb4d853ad95c0841f1f9c6d3dc102dccfcacd521d93925208b76ac8"
          workdir="$(mktemp -d)"
          # openssl.org removed old-release tarballs (404); use the official GitHub release asset
          curl -fsSL --retry 5 --retry-delay 5 \
            "https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-${openssl_version}.tar.gz" \
            -o "$workdir/openssl-${openssl_version}.tar.gz"
          echo "$openssl_sha256  $workdir/openssl-${openssl_version}.tar.gz" | sha256sum -c -
          tar -xzf "$workdir/openssl-${openssl_version}.tar.gz" -C "$workdir"
          cd "$workdir/openssl-${openssl_version}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            openssl_target="linux-aarch64"
          else
            openssl_target="linux-x86_64"
          fi
          ./Configure "$openssl_target" no-shared no-dso -fPIC \
            --prefix="$OPENSSL_DIR" \
            --openssldir="$OPENSSL_DIR/ssl"
          make -j"$(nproc)"
          sudo make install_sw
          ls -l "$OPENSSL_LIB_DIR"/libssl.a "$OPENSSL_LIB_DIR"/libcrypto.a
          rm -rf "$workdir"

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend assets
        run: pnpm --dir ${{ matrix.tauri_dir }} build:ui

      - name: Check Rust TLS dependency tree
        run: |
          set -euo pipefail
          cd "${{ matrix.tauri_dir }}/src-tauri"
          python3 - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("tauri.conf.json").read_text())
          allowlist = config.get("tauri", {}).get("allowlist", {})
          http = allowlist.get("http", {})

          if allowlist.get("all") is True:
              raise SystemExit("ERROR: tauri.allowlist.all enables api-all, which pulls native OpenSSL")

          if http.get("all") is True or http.get("request") is True:
              raise SystemExit("ERROR: Tauri built-in HTTP API may pull an uncontrolled OpenSSL version; use the app's native TLS path instead")
          PY
          for attempt in 1 2 3 4 5; do
            if cargo tree --target ${{ matrix.target }} --features custom-protocol --prefix depth > /tmp/cargo-tree.txt; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "ERROR: cargo tree failed after $attempt attempts"
              exit 1
            fi
            echo "cargo tree failed, retrying in $((attempt * 5)) seconds..."
            sleep $((attempt * 5))
          done
          if ! grep -E '(openssl|native-tls|tokio-native-tls) v[0-9]' /tmp/cargo-tree.txt; then
            echo "ERROR: Linux package is expected to use OpenSSL/native-tls"
            exit 1
          fi
          grep -E '(openssl|openssl-sys|native-tls|tokio-native-tls|hyper-tls) v[0-9]' /tmp/cargo-tree.txt || true

      - name: Build Linux packages with glibc 2.23 linker
        env:
          TAURI_TRAY: libappindicator3
        run: |
          set -euo pipefail
          linker="/tmp/zig-cc-glibc-2.23"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig_target="aarch64-linux-gnu.2.23"
            lib_dir="/usr/lib/aarch64-linux-gnu"
            base_lib_dir="/lib/aarch64-linux-gnu"
            rust_linker_env="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER"
          else
            zig_target="x86_64-linux-gnu.2.23"
            lib_dir="/usr/lib/x86_64-linux-gnu"
            base_lib_dir="/lib/x86_64-linux-gnu"
            rust_linker_env="CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER"
          fi
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            "exec zig cc -target $zig_target -L$OPENSSL_LIB_DIR -L$lib_dir -L$base_lib_dir \"\$@\"" \
            > "$linker"
          chmod +x "$linker"
          export "$rust_linker_env=$linker"
          export PKG_CONFIG_ALLOW_CROSS=1
          export LIBRARY_PATH="$OPENSSL_LIB_DIR:$lib_dir:$base_lib_dir${LIBRARY_PATH:+:$LIBRARY_PATH}"
          export PKG_CONFIG_PATH="$OPENSSL_LIB_DIR/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          export CI=true
          echo "Using Zig target: $zig_target"
          echo "Using library directory: $lib_dir"
          echo "Using OpenSSL directory: $OPENSSL_DIR"
          pkg-config --modversion openssl
          pkg-config --libs openssl
          pkg-config --libs webkit2gtk-4.0 gtk+-3.0
          ls -l "$lib_dir/libwebkit2gtk-4.0.so" "$lib_dir/libgtk-3.so"
          pnpm --dir ${{ matrix.tauri_dir }} tauri build --config src-tauri/tauri.linux.legacy.conf.json --target ${{ matrix.target }} --bundles deb

      # Resolve every dynamic symbol against a Kylin-era (Ubuntu 16.04) library
      # stack (GTK 3.18 / webkit2gtk 2.20 / gdk-pixbuf 2.32 / glibc 2.23).
      # ldd -r lists ALL unresolved symbols at once, unlike the target device
      # which only reports the first one per launch. Hard gate: any symbol
      # newer than this stack fails the build.
      - name: Check symbols against Kylin-era libraries
        run: |
          set -euo pipefail
          rel_dir="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release"
          bin=""
          # tauri v1 renames the cargo binary to the product name before bundling
          for cand in cpms-client-v1 cpmsClient-v1 cpms-client; do
            if [ -f "$rel_dir/$cand" ]; then bin="$rel_dir/$cand"; break; fi
          done
          if [ -z "$bin" ]; then
            echo "ERROR: app binary not found in $rel_dir"
            ls -la "$rel_dir" || true
            exit 1
          fi
          echo "Checking binary: $bin"
          image="${{ matrix.gate_image }}"
          mirror="${{ matrix.gate_mirror }}"
          docker run --rm -v "$PWD:/w" -e MIRROR="$mirror" -e BIN="/w/$bin" "$image" bash -c '
            set -e
            printf "%s\n" \
              "deb $MIRROR xenial main restricted universe multiverse" \
              "deb $MIRROR xenial-updates main restricted universe multiverse" \
              "deb $MIRROR xenial-security main restricted universe multiverse" \
              > /etc/apt/sources.list
            apt-get update -o Acquire::Retries=3 >/dev/null 2>&1
            apt-get install -y --no-install-recommends libwebkit2gtk-4.0-37 libgtk-3-0 libappindicator3-1 >/dev/null 2>&1
            echo "=== Kylin-era (xenial) library versions ==="
            dpkg-query -W libwebkit2gtk-4.0-37 libgtk-3-0 libgdk-pixbuf2.0-0 libglib2.0-0 libsoup2.4-1 libappindicator3-1 2>/dev/null || true
            test -f "$BIN" || { echo "ERROR: binary not found at $BIN"; exit 1; }
            echo "=== ldd -r full output ==="
            ldd -r "$BIN" 2>&1 || true
            echo "=== unresolved symbols on this stack ==="
            unresolved=$(ldd -r "$BIN" 2>&1 | grep -E "undefined symbol|not found" | sort -u || true)
            if [ -n "$unresolved" ]; then
              echo "$unresolved"
              echo "ERROR: binary references symbols newer than the Kylin-era stack"
              exit 1
            fi
            echo "(none - all symbols resolve)"
          '

      - name: Fix deb desktop entries
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          for deb in "$bundle_root"/deb/*.deb; do
            [ -e "$deb" ] || continue
            deb=$(realpath "$deb")
            tempdir=$(mktemp -d)
            dpkg-deb -x "$deb" "$tempdir"
            mkdir -p "$tempdir/DEBIAN"
            dpkg-deb -e "$deb" "$tempdir/DEBIAN"

            desktop_file=$(find "$tempdir/usr/share/applications" -name "*.desktop" | head -n1)
            if [ -f "$desktop_file" ]; then
              echo "Patching $desktop_file"

              # Ensure Type=Application (required by freedesktop spec)
              grep -q "^Type=" "$desktop_file" || echo "Type=Application" >> "$desktop_file"

              # Ensure Categories has a valid main category (Business alone is not a main category)
              if grep -q "^Categories=" "$desktop_file"; then
                current_cat=$(grep "^Categories=" "$desktop_file" | sed 's/Categories=//')
                # If Categories only contains Business (no main category), prepend Office
                if echo "$current_cat" | grep -qE '^Business;?$'; then
                  sed -i 's/^Categories=.*/Categories=Office;Business;/' "$desktop_file"
                fi
              else
                echo "Categories=Office;Business;" >> "$desktop_file"
              fi

              grep -q "^StartupNotify=" "$desktop_file" && \
                sed -i 's/^StartupNotify=.*/StartupNotify=true/' "$desktop_file" || \
                echo "StartupNotify=true" >> "$desktop_file"

              grep -q "^Terminal=" "$desktop_file" && \
                sed -i 's/^Terminal=.*/Terminal=false/' "$desktop_file" || \
                echo "Terminal=false" >> "$desktop_file"

              wmclass="cpmsClient-v1"
              grep -q "^StartupWMClass=" "$desktop_file" && \
                sed -i "s/^StartupWMClass=.*/StartupWMClass=$wmclass/" "$desktop_file" || \
                echo "StartupWMClass=$wmclass" >> "$desktop_file"

              echo "--- Final .desktop content ---"
              cat "$desktop_file"
            else
              echo "WARNING: No .desktop file found in extracted deb!"
            fi

            # Inject postinst to refresh icon cache
            postinst="$tempdir/DEBIAN/postinst"
            if [ -f "$postinst" ]; then
              echo "" >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
            else
              echo '#!/bin/sh' > "$postinst"
              echo 'set -e' >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              chmod 755 "$postinst"
            fi

            dpkg-deb -b "$tempdir" "$deb"
            rm -rf "$tempdir"

            # Convert zstd/xz compression back to gzip for compatibility with older dpkg
            ar_tmp=$(mktemp -d)
            pushd "$ar_tmp" >/dev/null
            ar x "$deb"
            for f in control.tar.* data.tar.*; do
              case "$f" in
                *.zst)
                  zstd -d "$f" -o "${f%.zst}"
                  gzip -n "${f%.zst}"
                  rm -f "$f"
                  ;;
                *.xz)
                  xz -d "$f"
                  gzip -n "${f%.xz}"
                  rm -f "$f"
                  ;;
              esac
            done
            rm -f "$deb"
            ar rcs "$deb" debian-binary control.tar.gz data.tar.gz
            popd >/dev/null
            rm -rf "$ar_tmp"
          done

      - name: Verify generated Linux bundles
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$bundle_root" -maxdepth 3 -type f -print
          for dir in deb; do
            if ! find "$bundle_root/$dir" -maxdepth 1 -type f | grep -q .; then
              echo "Missing Linux ${{ matrix.env_name }} bundle output: $dir"
              exit 1
            fi
          done
          du -h "$bundle_root"/deb/*

      - name: Debug deb package contents
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          for deb in "$bundle_root"/deb/*.deb; do
            [ -e "$deb" ] || continue
            echo "========== Package: $deb =========="
            echo "--- Control info ---"
            dpkg-deb -I "$deb"
            echo ""
            echo "--- File list ---"
            dpkg-deb -c "$deb"
            echo ""
            echo "--- .desktop file ---"
            tempdir=$(mktemp -d)
            dpkg-deb -x "$deb" "$tempdir"
            desktop_file=$(find "$tempdir/usr/share/applications" -name "*.desktop" 2>/dev/null | head -n1)
            if [ -f "$desktop_file" ]; then
              cat "$desktop_file"
            else
              echo "ERROR: No .desktop file found in package!"
            fi
            echo ""
            echo "--- Binary check ---"
            find "$tempdir/usr/bin" -type f 2>/dev/null | head -5
            bin_file=$(find "$tempdir/usr/bin" -maxdepth 1 -type f 2>/dev/null | head -n1)
            if [ -n "$bin_file" ]; then
              echo ""
              echo "--- Dynamic dependencies ---"
              readelf -d "$bin_file" | grep NEEDED || true
              if readelf -d "$bin_file" | grep NEEDED | grep -qE 'lib(ssl|crypto)\.so'; then
                echo "ERROR: OpenSSL must be statically linked; binary must not load any system libssl/libcrypto"
                exit 1
              fi
              echo ""
              echo "--- GTK legacy symbol check ---"
              if readelf -Ws "$bin_file" | grep -qE 'gdk_(display_get_n_monitors|monitor_)'; then
                readelf -Ws "$bin_file" | grep -E 'gdk_(display_get_n_monitors|monitor_)' || true
                echo "ERROR: binary uses GDK monitor APIs introduced after GTK 3.18"
                exit 1
              fi
              echo ""
              echo "--- GLIBC symbol versions ---"
              readelf -V "$bin_file" | grep -o 'GLIBC_[0-9.]*' | sort -Vu || true
              if readelf -V "$bin_file" | grep -qE 'GLIBC_2\.(2[4-9]|[3-9][0-9])'; then
                echo "ERROR: binary requires GLIBC newer than 2.23"
                exit 1
              fi
            fi
            echo ""
            echo "--- Icon check ---"
            find "$tempdir/usr/share/icons" -type f 2>/dev/null | head -10
            rm -rf "$tempdir"
          done

      - name: Prepare Linux artifacts
        run: |
          mkdir -p upload
          for deb in ${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb; do
            base=$(basename "$deb" .deb)
            cp "$deb" "upload/${base}_${{ matrix.env_name }}.deb"
          done
          ls -la upload/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-v1-${{ matrix.env_name }}-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release:
    # 激活 win/mac/linux-v2 后记得把对应 job 加进 needs
    needs: [build-linux-domestic]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" release/
          done
          echo "========== Release files =========="
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
