name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: v2
            tauri_dir: client-tauri2
            webkit_dev: libwebkit2gtk-4.1-dev
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - version: v2
            tauri_dir: client-tauri2
            webkit_dev: libwebkit2gtk-4.1-dev
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.tauri_dir }}/src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.webkit_dev }} libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils zstd

      - name: Install dependencies
        run: pnpm install

      - name: Build Linux packages
        run: pnpm --dir ${{ matrix.tauri_dir }} tauri build --config src-tauri/tauri.linux.conf.json --target ${{ matrix.target }} --bundles deb

      - name: Fix deb desktop entries
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          for deb in "$bundle_root"/deb/*.deb; do
            [ -e "$deb" ] || continue
            deb=$(realpath "$deb")
            tempdir=$(mktemp -d)
            dpkg-deb -x "$deb" "$tempdir"
            mkdir -p "$tempdir/DEBIAN"
            dpkg-deb -e "$deb" "$tempdir/DEBIAN"

            desktop_file=$(find "$tempdir/usr/share/applications" -name "*.desktop" | head -n1)
            if [ -f "$desktop_file" ]; then
              echo "Patching $desktop_file"
              grep -q "^StartupNotify=" "$desktop_file" && \
                sed -i 's/^StartupNotify=.*/StartupNotify=true/' "$desktop_file" || \
                echo "StartupNotify=true" >> "$desktop_file"

              grep -q "^Terminal=" "$desktop_file" && \
                sed -i 's/^Terminal=.*/Terminal=false/' "$desktop_file" || \
                echo "Terminal=false" >> "$desktop_file"

              wmclass="cpmsClient"
              if [ "${{ matrix.version }}" = "v1" ]; then
                wmclass="cpmsClient-v1"
              else
                wmclass="cpmsClient-v2"
              fi
              grep -q "^StartupWMClass=" "$desktop_file" && \
                sed -i "s/^StartupWMClass=.*/StartupWMClass=$wmclass/" "$desktop_file" || \
                echo "StartupWMClass=$wmclass" >> "$desktop_file"
            fi

            # Inject postinst to refresh icon cache and provide Kylin appindicator compatibility
            postinst="$tempdir/DEBIAN/postinst"
            if [ -f "$postinst" ]; then
              echo "" >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "# Kylin/UOS compatibility: symlink ayatana -> legacy appindicator if only ayatana is present" >> "$postinst"
              echo "for libdir in /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu /usr/lib; do" >> "$postinst"
              echo '  if [ -f "$libdir/libayatana-appindicator3.so.1" ] && [ ! -f "$libdir/libappindicator3.so.1" ]; then' >> "$postinst"
              echo '    ln -sf "$libdir/libayatana-appindicator3.so.1" "$libdir/libappindicator3.so.1"' >> "$postinst"
              echo "  fi" >> "$postinst"
              echo "done" >> "$postinst"
              echo "if command -v ldconfig >/dev/null 2>&1; then" >> "$postinst"
              echo "  ldconfig || true" >> "$postinst"
              echo "fi" >> "$postinst"
            else
              echo '#!/bin/sh' > "$postinst"
              echo 'set -e' >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "# Kylin/UOS compatibility: symlink ayatana -> legacy appindicator if only ayatana is present" >> "$postinst"
              echo "for libdir in /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu /usr/lib; do" >> "$postinst"
              echo '  if [ -f "$libdir/libayatana-appindicator3.so.1" ] && [ ! -f "$libdir/libappindicator3.so.1" ]; then' >> "$postinst"
              echo '    ln -sf "$libdir/libayatana-appindicator3.so.1" "$libdir/libappindicator3.so.1"' >> "$postinst"
              echo "  fi" >> "$postinst"
              echo "done" >> "$postinst"
              echo "if command -v ldconfig >/dev/null 2>&1; then" >> "$postinst"
              echo "  ldconfig || true" >> "$postinst"
              echo "fi" >> "$postinst"
              chmod 755 "$postinst"
            fi

            dpkg-deb -b "$tempdir" "$deb"
            rm -rf "$tempdir"

            # Convert zstd/xz compression back to gzip for compatibility with older dpkg
            ar_tmp=$(mktemp -d)
            pushd "$ar_tmp" >/dev/null
            ar x "$deb"
            for f in control.tar.* data.tar.*; do
              case "$f" in
                *.zst)
                  zstd -d "$f" -o "${f%.zst}"
                  gzip -n "${f%.zst}"
                  rm -f "$f"
                  ;;
                *.xz)
                  xz -d "$f"
                  gzip -n "${f%.xz}"
                  rm -f "$f"
                  ;;
              esac
            done
            rm -f "$deb"
            ar rcs "$deb" debian-binary control.tar.gz data.tar.gz
            popd >/dev/null
            rm -rf "$ar_tmp"
          done

      - name: Verify generated Linux bundles
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$bundle_root" -maxdepth 3 -type f -print
          for dir in deb; do
            if ! find "$bundle_root/$dir" -maxdepth 1 -type f | grep -q .; then
              echo "Missing Linux ${{ matrix.version }} bundle output: $dir"
              exit 1
            fi
          done
          du -h "$bundle_root"/deb/*

      - name: Prepare Linux artifacts
        run: |
          mkdir -p upload
          cp ${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb upload/
          ls -la upload/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-${{ matrix.version }}-linux-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" release/
          done
          echo "========== Release files =========="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
