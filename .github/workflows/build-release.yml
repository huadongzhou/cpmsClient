name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: v2
            tauri_dir: client-tauri2
            webkit_dev: libwebkit2gtk-4.1-dev
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - version: v2
            tauri_dir: client-tauri2
            webkit_dev: libwebkit2gtk-4.1-dev
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.tauri_dir }}/src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.webkit_dev }} libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils

      - name: Install dependencies
        run: pnpm install

      - name: Build Linux packages
        run: pnpm --dir ${{ matrix.tauri_dir }} tauri build --config src-tauri/tauri.linux.conf.json --target ${{ matrix.target }} --bundles deb rpm

      - name: Verify generated Linux bundles
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$bundle_root" -maxdepth 3 -type f -print
          for dir in deb rpm; do
            if ! find "$bundle_root/$dir" -maxdepth 1 -type f | grep -q .; then
              echo "Missing Linux ${{ matrix.version }} bundle output: $dir"
              exit 1
            fi
          done
          du -h "$bundle_root"/deb/* "$bundle_root"/rpm/*

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-${{ matrix.version }}-linux-${{ matrix.arch }}
          path: |
            ${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*
            ${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*
          if-no-files-found: error

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" release/
          done
          echo "========== Release files =========="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
