name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # v2 temporarily disabled - building v1 only for Kylin/UOS compatibility
          # - version: v2
          #   tauri_dir: client-tauri2
          #   webkit_dev: libwebkit2gtk-4.1-dev
          #   platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   arch: x86_64
          # - version: v2
          #   tauri_dir: client-tauri2
          #   webkit_dev: libwebkit2gtk-4.1-dev
          #   platform: ubuntu-22.04-arm
          #   target: aarch64-unknown-linux-gnu
          #   arch: arm64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - version: v1
            tauri_dir: client-tauri1
            webkit_dev: libwebkit2gtk-4.0-dev
            platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.webkit_dev }} libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils zstd

      - name: Install dependencies
        run: pnpm install

      - name: Build Linux packages in Ubuntu 20.04 container
        env:
          TAURI_TRAY: libappindicator3
        run: |
          mkdir -p .cache/docker/cargo .cache/docker/pnpm .cache/docker/rustup
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ github.workspace }}/.cache/docker/cargo:/root/.cargo/registry \
            -v ${{ github.workspace }}/.cache/docker/pnpm:/root/.local/share/pnpm \
            -v ${{ github.workspace }}/.cache/docker/rustup:/root/.rustup \
            -e TAURI_TRAY=libappindicator3 \
            -e CI=true \
            -e RUSTUP_HOME=/root/.rustup \
            -e CARGO_HOME=/root/.cargo \
            ${{ matrix.arch == 'arm64' && 'arm64v8/ubuntu:20.04' || 'ubuntu:20.04' }} \
            bash -c "
              export DEBIAN_FRONTEND=noninteractive
              export CI=true
              export RUSTUP_HOME=/root/.rustup
              export CARGO_HOME=/root/.cargo
              export PATH=\"/root/.cargo/bin:\$PATH\"
              apt-get update
              apt-get install -y curl build-essential libwebkit2gtk-4.0-dev libgtk-3-dev libappindicator3-dev librsvg2-dev libssl-dev patchelf libfuse2 xdg-utils zstd pkg-config git ca-certificates

              # Node.js 22
              curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
              apt-get install -y nodejs

              # pnpm
              npm install -g pnpm@11.5.0
              pnpm config set store-dir /root/.local/share/pnpm
              pnpm config set confirmModulesPurge false

              # Rust
              rm -f /root/.rustup/settings.toml
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              rustup target add ${{ matrix.target }}

              # Build in isolated /build directory to avoid workspace cache pollution
              cp -r /workspace /build
              rm -rf /build/client-tauri1/src-tauri/target
              rm -rf /build/client-tauri2/src-tauri/target
              cd /build
              pnpm install
              pnpm --dir ${{ matrix.tauri_dir }} tauri build --config src-tauri/tauri.linux.conf.json --target ${{ matrix.target }} --bundles deb

              # Copy artifacts back to workspace
              mkdir -p /workspace/${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle
              cp -r /build/${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/* /workspace/${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/
              chmod -R a+w /workspace/${{ matrix.tauri_dir }}/src-tauri/target
            "

      - name: Fix deb desktop entries
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          for deb in "$bundle_root"/deb/*.deb; do
            [ -e "$deb" ] || continue
            deb=$(realpath "$deb")
            tempdir=$(mktemp -d)
            dpkg-deb -x "$deb" "$tempdir"
            mkdir -p "$tempdir/DEBIAN"
            dpkg-deb -e "$deb" "$tempdir/DEBIAN"

            desktop_file=$(find "$tempdir/usr/share/applications" -name "*.desktop" | head -n1)
            if [ -f "$desktop_file" ]; then
              echo "Patching $desktop_file"

              # Ensure Type=Application (required by freedesktop spec)
              grep -q "^Type=" "$desktop_file" || echo "Type=Application" >> "$desktop_file"

              # Ensure Categories has a valid main category (Business alone is not a main category)
              if grep -q "^Categories=" "$desktop_file"; then
                current_cat=$(grep "^Categories=" "$desktop_file" | sed 's/Categories=//')
                # If Categories only contains Business (no main category), prepend Office
                if echo "$current_cat" | grep -qE '^Business;?$'; then
                  sed -i 's/^Categories=.*/Categories=Office;Business;/' "$desktop_file"
                fi
              else
                echo "Categories=Office;Business;" >> "$desktop_file"
              fi

              grep -q "^StartupNotify=" "$desktop_file" && \
                sed -i 's/^StartupNotify=.*/StartupNotify=true/' "$desktop_file" || \
                echo "StartupNotify=true" >> "$desktop_file"

              grep -q "^Terminal=" "$desktop_file" && \
                sed -i 's/^Terminal=.*/Terminal=false/' "$desktop_file" || \
                echo "Terminal=false" >> "$desktop_file"

              wmclass="cpmsClient"
              if [ "${{ matrix.version }}" = "v1" ]; then
                wmclass="cpmsClient-v1"
              else
                wmclass="cpmsClient-v2"
              fi
              grep -q "^StartupWMClass=" "$desktop_file" && \
                sed -i "s/^StartupWMClass=.*/StartupWMClass=$wmclass/" "$desktop_file" || \
                echo "StartupWMClass=$wmclass" >> "$desktop_file"

              echo "--- Final .desktop content ---"
              cat "$desktop_file"
            else
              echo "WARNING: No .desktop file found in extracted deb!"
            fi

            # Inject postinst to refresh icon cache
            postinst="$tempdir/DEBIAN/postinst"
            if [ -f "$postinst" ]; then
              echo "" >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
            else
              echo '#!/bin/sh' > "$postinst"
              echo 'set -e' >> "$postinst"
              echo "# --- CPMS Client postinst extensions ---" >> "$postinst"
              echo "# Refresh desktop database and icon cache for Start Menu / taskbar icon visibility" >> "$postinst"
              echo "if command -v update-desktop-database >/dev/null 2>&1; then" >> "$postinst"
              echo "  update-desktop-database /usr/share/applications >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              echo "if command -v gtk-update-icon-cache >/dev/null 2>&1; then" >> "$postinst"
              echo "  gtk-update-icon-cache -f /usr/share/icons/hicolor >/dev/null 2>&1 || true" >> "$postinst"
              echo "fi" >> "$postinst"
              chmod 755 "$postinst"
            fi

            dpkg-deb -b "$tempdir" "$deb"
            rm -rf "$tempdir"

            # Convert zstd/xz compression back to gzip for compatibility with older dpkg
            ar_tmp=$(mktemp -d)
            pushd "$ar_tmp" >/dev/null
            ar x "$deb"
            for f in control.tar.* data.tar.*; do
              case "$f" in
                *.zst)
                  zstd -d "$f" -o "${f%.zst}"
                  gzip -n "${f%.zst}"
                  rm -f "$f"
                  ;;
                *.xz)
                  xz -d "$f"
                  gzip -n "${f%.xz}"
                  rm -f "$f"
                  ;;
              esac
            done
            rm -f "$deb"
            ar rcs "$deb" debian-binary control.tar.gz data.tar.gz
            popd >/dev/null
            rm -rf "$ar_tmp"
          done

      - name: Verify generated Linux bundles
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$bundle_root" -maxdepth 3 -type f -print
          for dir in deb; do
            if ! find "$bundle_root/$dir" -maxdepth 1 -type f | grep -q .; then
              echo "Missing Linux ${{ matrix.version }} bundle output: $dir"
              exit 1
            fi
          done
          du -h "$bundle_root"/deb/*

      - name: Debug deb package contents
        run: |
          bundle_root="${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle"
          for deb in "$bundle_root"/deb/*.deb; do
            [ -e "$deb" ] || continue
            echo "========== Package: $deb =========="
            echo "--- Control info ---"
            dpkg-deb -I "$deb"
            echo ""
            echo "--- File list ---"
            dpkg-deb -c "$deb"
            echo ""
            echo "--- .desktop file ---"
            tempdir=$(mktemp -d)
            dpkg-deb -x "$deb" "$tempdir"
            desktop_file=$(find "$tempdir/usr/share/applications" -name "*.desktop" 2>/dev/null | head -n1)
            if [ -f "$desktop_file" ]; then
              cat "$desktop_file"
            else
              echo "ERROR: No .desktop file found in package!"
            fi
            echo ""
            echo "--- Binary check ---"
            find "$tempdir/usr/bin" -type f 2>/dev/null | head -5
            echo ""
            echo "--- Icon check ---"
            find "$tempdir/usr/share/icons" -type f 2>/dev/null | head -10
            rm -rf "$tempdir"
          done

      - name: Prepare Linux artifacts
        run: |
          mkdir -p upload
          cp ${{ matrix.tauri_dir }}/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb upload/
          ls -la upload/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpmsClient-${{ matrix.version }}-linux-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" release/
          done
          echo "========== Release files =========="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
