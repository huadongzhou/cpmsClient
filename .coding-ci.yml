# .coding-ci.yml
# CODING 持续集成配置
# 支持国产 Linux 系统打包（deb / rpm / appimage）

# 通用 Linux 构建环境
.linux-build-env: &linux-build-env
  docker:
    image: ubuntu:22.04

# 通用构建阶段
.linux-stages: &linux-stages
  - name: 安装系统依赖
    script: |
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y curl build-essential libssl-dev pkg-config
      apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  - name: 安装项目依赖
    script: |
      . $HOME/.cargo/env
      npm install -g pnpm@11.5.0
      pnpm install
  - name: 构建应用
    script: |
      . $HOME/.cargo/env
      pnpm build:all
  - name: 收集产物
    script: |
      echo "========== 构建产物 =========="
      find src-tauri/target/release/bundle -type f
      mkdir -p artifacts
      cp src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
      cp src-tauri/target/release/bundle/rpm/*.rpm artifacts/ 2>/dev/null || true
      cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
      echo "========== 已归档产物 =========="
      ls -la artifacts/

master:
  push:
    - name: linux-build
      <<: *linux-build-env
      stages: *linux-stages

  tag_push:
    - name: linux-release
      <<: *linux-build-env
      stages: *linux-stages

builder:
  push:
    - name: linux-build
      <<: *linux-build-env
      stages: *linux-stages

  tag_push:
    - name: linux-release
      <<: *linux-build-env
      stages: *linux-stages
