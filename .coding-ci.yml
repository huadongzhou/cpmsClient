# .coding-ci.yml
# CODING 持续集成配置
# 单流水线构建：x86_64 (deb/rpm/appimage) + arm64 (deb)

.linux-build-env: &linux-build-env
  docker:
    image: ubuntu:22.04

.linux-stages: &linux-stages
  - name: 安装基础依赖
    script: |
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y git curl build-essential libssl-dev pkg-config \
        xdg-utils libfuse2 patchelf file
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      . $HOME/.cargo/env
      npm install -g pnpm@11.5.0
      pnpm install

  - name: 构建 x86_64 全格式
    script: |
      export DEBIAN_FRONTEND=noninteractive
      . $HOME/.cargo/env

      # 安装 x86_64 GUI 开发库
      apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
        libayatana-appindicator3-dev librsvg2-dev

      export APPIMAGE_EXTRACT_AND_RUN=1

      # 先构建 deb + rpm（不需要从 GitHub 下载外部工具）
      pnpm --dir client-tauri2 tauri build --bundles deb rpm

      # 再构建 appimage（需要从 GitHub 下载 linuxdeploy，CODING CI 内网容易 504）
      # 失败不阻断流水线，确保 deb/rpm 核心产物始终可用
      pnpm --dir client-tauri2 tauri build --bundles appimage || echo "WARNING: AppImage build failed (GitHub 504), skipping"

  - name: 配置 arm64 交叉编译环境
    script: |
      export DEBIAN_FRONTEND=noninteractive
      . $HOME/.cargo/env

      # 安装交叉编译器
      apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # 启用 arm64 架构支持
      # archive.ubuntu.com 不提供 arm64，ports.ubuntu.com 不提供 amd64，需两者共存
      dpkg --add-architecture arm64

      # 1) 撤销之前可能改错的 ports 源，恢复 archive.ubuntu.com
      sed -i 's|http://ports.ubuntu.com/ubuntu-ports/|http://archive.ubuntu.com/ubuntu/|g' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true

      # 2) 为现有源限制只下载 amd64 包
      sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true

      # 3) 单独添加 arm64 的 ports 源
      echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse' >> /etc/apt/sources.list
      echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse' >> /etc/apt/sources.list
      echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse' >> /etc/apt/sources.list

      apt-get update

      # 安装 arm64 运行库（可与 x86_64 版本共存）
      apt-get install -y libwebkit2gtk-4.1-0:arm64 libgtk-3-0:arm64 \
        libayatana-appindicator3-1:arm64 librsvg2-2:arm64 \
        libssl3:arm64 libcurl4:arm64

      # 创建 arm64 sysroot
      mkdir -p /opt/arm64-sysroot

      # 下载 arm64 dev 包及其依赖到 apt 缓存（不安装到系统，避免与 x86_64 dev 包冲突）
      apt-get install --reinstall -y -d --no-install-recommends \
        libwebkit2gtk-4.1-dev:arm64 \
        libgtk-3-dev:arm64 \
        libayatana-appindicator3-dev:arm64 \
        librsvg2-dev:arm64 \
        libssl-dev:arm64 \
        libcurl4-openssl-dev:arm64 \
        libc6-dev:arm64

      # 提取所有 arm64 包到 sysroot
      for deb in /var/cache/apt/archives/*_arm64.deb; do
        [ -f "$deb" ] && dpkg-deb -x "$deb" /opt/arm64-sysroot/
      done

      # 确保 cargo 配置已包含 arm64 链接器
      if ! grep -q "\[target.aarch64-unknown-linux-gnu\]" ~/.cargo/config.toml 2>/dev/null; then
        cat >> ~/.cargo/config.toml << 'EOF'

      [target.aarch64-unknown-linux-gnu]
      linker = "aarch64-linux-gnu-gcc"
      EOF
      fi

      # 安装 Rust target
      rustup target add aarch64-unknown-linux-gnu

  - name: 构建 arm64 deb
    script: |
      . $HOME/.cargo/env

      # 设置交叉编译环境变量，让 pkg-config 在 sysroot 中查找 arm64 库
      export PKG_CONFIG_SYSROOT_DIR=/opt/arm64-sysroot
      export PKG_CONFIG_PATH=/opt/arm64-sysroot/usr/lib/aarch64-linux-gnu/pkgconfig:/opt/arm64-sysroot/usr/share/pkgconfig
      export PKG_CONFIG_ALLOW_CROSS=1

      pnpm build:linux:deb:arm64 || echo "WARNING: arm64 deb build failed (cross-compile limitation), skipping"

  - name: 收集产物
    script: |
      mkdir -p artifacts
      # x86_64 产物（默认 target，路径在 target/release/bundle）
      cp client-tauri2/src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
      cp client-tauri2/src-tauri/target/release/bundle/rpm/*.rpm artifacts/ 2>/dev/null || true
      cp client-tauri2/src-tauri/target/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
      # arm64 产物
      cp client-tauri2/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
      echo "========== 已归档产物 =========="
      ls -la artifacts/

  - name: 推送制品仓库
    script: |
      if [ -z "$(find artifacts -maxdepth 1 -type f -print -quit)" ]; then
        echo "artifacts 目录为空，终止推送"
        exit 1
      fi

      npm install -g coding-generic@latest

      REPO_NAME="${CI_REPO_NAME:-${CODING_REPO_NAME:-}}"
      if [ -z "$REPO_NAME" ]; then
        REPO_URL="$(git remote get-url origin)"
        REPO_NAME="$(basename "$REPO_URL" .git)"
      fi

      TAG_NAME="${CI_TAG:-${CODING_TAG_NAME:-${GIT_TAG:-${CI_COMMIT_TAG:-}}}}"
      TAG_NAME="${TAG_NAME#refs/tags/}"
      if [ -z "$TAG_NAME" ]; then
        TAG_NAME="$(git tag --points-at HEAD | head -n 1)"
      fi
      if [ -z "$TAG_NAME" ]; then
        TAG_NAME="$(date +%Y%m%d%H%M%S)"
        echo "未获取到 Tag，使用默认版本: $TAG_NAME"
      fi

      PACKAGE_VERSION="${TAG_NAME#v}"
      ARTIFACT_FOLDER="${REPO_NAME}-$(echo "$TAG_NAME" | tr '/' '-')"
      rm -rf "$ARTIFACT_FOLDER"
      mkdir -p "$ARTIFACT_FOLDER"
      cp artifacts/* "$ARTIFACT_FOLDER"/

      echo "========== 推送制品到 CODING Generic =========="
      echo "folder: ${ARTIFACT_FOLDER}"
      echo "version: ${PACKAGE_VERSION}"
      set +e
      coding-generic -u=app-1780655294328:ca4c4d51e8f9d94c775c5bddeaf963a3193491ea --dir --path="$ARTIFACT_FOLDER" --registry="https://insolu-generic.pkg.coding.net/cpmsclient/app?version=${PACKAGE_VERSION}" > coding-generic-upload.log 2>&1
      UPLOAD_EXIT=$?
      set -e
      cat coding-generic-upload.log
      if [ "$UPLOAD_EXIT" -ne 0 ] || grep -E "Request failed|网络请求错误|page not found|程序发生了一些异常" coding-generic-upload.log; then
        echo "CODING Generic 上传失败"
        exit 1
      fi

master:
  push:
    - name: linux-build
      <<: *linux-build-env
      stages: *linux-stages

  tag_push:
    - name: linux-build
      <<: *linux-build-env
      stages: *linux-stages

builder:
  push:
    - name: linux-build
      <<: *linux-build-env
      stages: *linux-stages

  tag_push:
    - name: linux-build
      <<: *linux-build-env
      stages: *linux-stages
